version: '3.9'

# ── Local testing — mirrors Coolify production exactly ────────────────────────
# Usage:  docker compose up --build
# API:    http://localhost:3000/api
# DB:     localhost:3306  (accurax_user / accurax_pass)
# ─────────────────────────────────────────────────────────────────────────────
# NOTE: Frontend is hosted separately on Hostinger.
#       Set VITE_API_URL=http://localhost:3000 in your local .env to proxy calls.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: accurax_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: accurax
      MYSQL_USER: accurax_user
      MYSQL_PASSWORD: accurax_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── AccuraX Express API (backend only) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accurax_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000

      # DB_HOST must match the service name above ("mysql")
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: accurax_user
      DB_PASS: accurax_pass
      DB_NAME: accurax

      JWT_SECRET: local_dev_only_change_in_production_abc123xyz

      SMTP_HOST: smtp.hostinger.com
      SMTP_PORT: 465
      SMTP_USER: noreply@accurax.in
      SMTP_PASS: "#Accurax@123987"

      # This must match the Hostinger frontend domain so CORS works
      FRONTEND_URL: https://accurax.in

      RAZORPAY_KEY_ID: rzp_test_SOeqXdmB1oEbtZ
      RAZORPAY_KEY_SECRET: BR77nFcYxoQQptIpp72xY9se

volumes:
  mysql_data:
